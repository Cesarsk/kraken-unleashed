name: Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build-windows:
    runs-on: windows-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      VT_API_KEY: ${{ secrets.VT_API_KEY }}
      CSC_IDENTITY_AUTO_DISCOVERY: 'false'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Validate tag matches package version
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        shell: pwsh
        run: |
          $packageVersion = node -p "require('./package.json').version"
          if ("v$packageVersion" -ne "${{ github.ref_name }}") {
            throw "Tag ${{ github.ref_name }} does not match package.json version v$packageVersion"
          }

      - name: Build Windows artifacts
        run: npm run dist:win

      - name: Generate checksums
        shell: pwsh
        run: |
          $artifacts = Get-ChildItem dist -File | Where-Object {
            $_.Extension -in '.exe', '.blockmap', '.yml'
          } | Sort-Object Name

          if (-not $artifacts) {
            throw "No packaged artifacts found in dist/."
          }

          $lines = foreach ($artifact in $artifacts) {
            $hash = (Get-FileHash $artifact.FullName -Algorithm SHA256).Hash.ToLower()
            "$hash *$($artifact.Name)"
          }

          Set-Content -Path dist\SHA256SUMS.txt -Value $lines

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-dist
          path: |
            dist/*.exe
            dist/*.blockmap
            dist/*.yml
            dist/SHA256SUMS.txt
          if-no-files-found: error

      - name: Publish stable release
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $title = "Kraken Unleashed $tag"
          $notes = @"
          Stable release for $tag.

          Commit: ${{ github.sha }}
          "@

          gh release view $tag --repo Cesarsk/kraken-unleashed *> $null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag `
              --repo Cesarsk/kraken-unleashed `
              --title $title `
              --notes $notes `
              --latest
          } else {
            gh release edit $tag `
              --repo Cesarsk/kraken-unleashed `
              --title $title `
              --notes $notes `
              --latest
          }

          gh release upload $tag `
            dist/*.exe `
            dist/*.blockmap `
            dist/*.yml `
            dist/SHA256SUMS.txt `
            --repo Cesarsk/kraken-unleashed `
            --clobber

      - name: Publish rolling edge release
        if: ${{ github.ref == 'refs/heads/main' }}
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f edge "${{ github.sha }}"
          git push origin refs/tags/edge --force

          $shortSha = "${{ github.sha }}".Substring(0, 7)
          $notes = @"
          Automated prerelease from `main`.

          Commit: ${{ github.sha }}
          "@

          gh release view edge --repo Cesarsk/kraken-unleashed *> $null
          if ($LASTEXITCODE -ne 0) {
            gh release create edge `
              --repo Cesarsk/kraken-unleashed `
              --title "Edge" `
              --notes $notes `
              --prerelease
          } else {
            gh release edit edge `
              --repo Cesarsk/kraken-unleashed `
              --title "Edge" `
              --notes $notes `
              --prerelease
          }

          gh release upload edge `
            dist/*.exe `
            dist/*.blockmap `
            dist/*.yml `
            dist/SHA256SUMS.txt `
            --repo Cesarsk/kraken-unleashed `
            --clobber

          "Published edge release from $shortSha." | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8

      - name: Submit installer to VirusTotal
        if: ${{ env.VT_API_KEY != '' && hashFiles('dist/*setup*.exe') != '' }}
        shell: pwsh
        run: |
          $installer = Get-ChildItem dist\*setup*.exe | Select-Object -First 1 -ExpandProperty FullName
          if (-not $installer) {
            throw "No Windows installer artifact found for VirusTotal upload."
          }

          node scripts/upload-virustotal.js $installer
          Get-Content dist\virustotal\summary.md | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8

      - name: Upload VirusTotal report
        if: ${{ env.VT_API_KEY != '' && hashFiles('dist/virustotal/*') != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: virustotal-report
          path: dist/virustotal/*
          if-no-files-found: error
